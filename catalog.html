<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>العمالة المتوفرة</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@400;500;600;700&display=swap');
  :root{--primary:#0C4A45;--bg:#F4F2EC;--card:#fff;--ink:#16211F;--sub:#5C6A66;--line:#E5E1D6;--gold:#B5862A;}
  *{box-sizing:border-box;font-family:'IBM Plex Sans Arabic',sans-serif;}
  body{margin:0;background:var(--bg);color:var(--ink);}
  .wrap{max-width:1000px;margin:0 auto;padding:26px 16px 60px;}
  .brand{display:flex;align-items:center;gap:10px;margin-bottom:6px;}
  .logo{width:44px;height:44px;border-radius:13px;background:var(--primary);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;}
  h1{font-size:20px;margin:14px 0 2px;} .muted{color:var(--sub);font-size:13px;}
  .filters{display:flex;gap:8px;flex-wrap:wrap;margin:18px 0;}
  .chip{border:1px solid var(--line);background:#fff;color:var(--ink);border-radius:999px;padding:7px 15px;font-size:13px;font-weight:600;cursor:pointer;}
  .chip.active{background:var(--primary);color:#fff;border-color:var(--primary);}
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(230px,1fr));gap:16px;}
  .wcard{background:var(--card);border:1px solid var(--line);border-radius:18px;overflow:hidden;cursor:pointer;transition:box-shadow .15s,transform .15s;}
  .wcard:hover{box-shadow:0 10px 30px rgba(0,0,0,.10);transform:translateY(-2px);}
  .ph{height:170px;background:#E3EEEC;display:flex;align-items:center;justify-content:center;}
  .ph img{width:100%;height:100%;object-fit:cover;}
  .ph .ini{width:74px;height:74px;border-radius:50%;background:var(--primary);color:#fff;display:flex;align-items:center;justify-content:center;font-size:30px;font-weight:700;}
  .body{padding:14px;}
  .body .nm{font-weight:700;font-size:15px;}
  .body .meta{color:var(--sub);font-size:13px;margin-top:3px;}
  .tags{margin-top:10px;display:flex;gap:6px;flex-wrap:wrap;}
  .tag{background:#E3EEEC;color:var(--primary);border-radius:8px;padding:3px 10px;font-size:12px;font-weight:600;}
  .view-btn{display:block;text-align:center;margin-top:12px;background:var(--primary);color:#fff;border-radius:10px;padding:9px;font-weight:700;font-size:13px;}
  .err{background:#FEF2F2;color:#B91C1C;padding:12px 14px;border-radius:12px;font-size:14px;margin-top:20px;}
  .empty{text-align:center;color:var(--sub);padding:40px;}
  /* modal */
  .overlay{position:fixed;inset:0;background:rgba(20,33,31,.55);display:none;align-items:flex-start;justify-content:center;padding:24px 14px;overflow:auto;z-index:50;}
  .overlay.open{display:flex;}
  .modal{background:#fff;border-radius:20px;max-width:680px;width:100%;overflow:hidden;}
  .modal-head{display:flex;gap:14px;align-items:center;padding:20px;border-bottom:1px solid var(--line);}
  .modal-head .av{width:64px;height:64px;border-radius:50%;background:var(--primary);color:#fff;display:flex;align-items:center;justify-content:center;font-size:26px;font-weight:700;overflow:hidden;}
  .modal-head .av img{width:100%;height:100%;object-fit:cover;}
  .modal-body{padding:20px;}
  .cv-frame{width:100%;height:380px;border:1px solid var(--line);border-radius:12px;background:#FBFAF6;}
  .open-cv{display:inline-block;margin-top:8px;color:var(--primary);font-weight:700;font-size:13px;text-decoration:none;}
  .res{margin-top:18px;border-top:1px solid var(--line);padding-top:16px;}
  .res input{width:100%;padding:11px 13px;border:1px solid var(--line);border-radius:11px;background:#FBFAF6;font-size:15px;outline:none;margin-top:8px;}
  .btn{width:100%;background:var(--primary);color:#fff;border:none;border-radius:12px;padding:12px;font-weight:800;font-size:15px;cursor:pointer;margin-top:12px;}
  .btn.gold{background:var(--gold);}
  .x{margin-right:auto;background:none;border:none;font-size:22px;color:var(--sub);cursor:pointer;}
  .ok{background:#ECFDF5;color:#047857;padding:12px 14px;border-radius:12px;font-size:14px;margin-top:12px;display:none;}
  .merr{background:#FEF2F2;color:#B91C1C;padding:10px 13px;border-radius:11px;font-size:13px;margin-top:10px;display:none;}
</style>
</head>
<body>
<script>
/* محاكاة الـ API للمعاينة الثابتة فقط — لا خادم ولا حفظ بيانات.
   تعترض كل نداءات fetch إلى /api/... وتُعيد بيانات تجريبية في الذاكرة. */
(function () {
  const ALL = ["orders.view","orders.create","orders.edit","orders.advance","documents.manage","finance.view","finance.edit","workers.view","workers.manage","dashboard.view","users.manage"];
  const SUPER = ["offices.manage","users.manage"];

  const MOCK = {
    offices: [
      { id:1, name:"مكتب الرياض للاستقدام", active:true, catalogKey:"demo-riyadh", users:5, orders:2, workers:4 },
      { id:2, name:"مكتب جدة للاستقدام", active:true, catalogKey:"demo-jeddah", users:1, orders:1, workers:1 },
    ],
    users: [
      { id:1, name:"مشرف الرياض", username:"supervisor", role:"supervisor", active:true },
      { id:2, name:"محاسب الرياض", username:"accountant", role:"accountant", active:true },
      { id:3, name:"موظف متابعة", username:"followup", role:"follow_up", active:true },
      { id:4, name:"موظف استقبال", username:"reception", role:"reception", active:true },
    ],
    roles: [
      { role:"supervisor", label:"مشرف المكتب", permissions:["orders.view","orders.create","orders.edit","orders.advance","documents.manage","finance.view","finance.edit","workers.view","workers.manage","dashboard.view","users.manage"] },
      { role:"accountant", label:"محاسب", permissions:["orders.view","finance.view","finance.edit","documents.manage","workers.view","dashboard.view"] },
      { role:"follow_up", label:"موظف متابعة", permissions:["orders.view","orders.edit","orders.advance","documents.manage","workers.view","workers.manage","dashboard.view"] },
      { role:"reception", label:"موظف استقبال", permissions:["orders.view","orders.create","orders.edit","documents.manage","workers.view","workers.manage"] },
    ],
    workers: [
      { id:1, name:"Maria Santos", age:32, nationality:"الفلبين", profession:"عاملة منزلية", phone:"0563000001", passportNo:"P9921045", status:"available", hasPhoto:false, hasCv:true, reservation:null },
      { id:2, name:"Aisha Bekele", age:28, nationality:"إثيوبيا", profession:"عاملة منزلية", phone:"", passportNo:"ET5512098", status:"available", hasPhoto:false, hasCv:false, reservation:null },
      { id:3, name:"Rahim Uddin", age:35, nationality:"بنغلاديش", profession:"سائق خاص", phone:"0563000003", passportNo:"BX4410922", status:"reserved", hasPhoto:false, hasCv:false, reservation:{ clientPhone:"0561234567", status:"pending", at:"2026-06-05" } },
      { id:4, name:"Grace Wanjiru", age:30, nationality:"كينيا", profession:"عاملة منزلية", phone:"", passportNo:"KE7781234", status:"available", hasPhoto:false, hasCv:true, reservation:null },
    ],
    reservations: [
      { id:1, clientPhone:"0561234567", status:"pending", at:"2026-06-05", worker:{ id:3, name:"Rahim Uddin", nationality:"بنغلاديش", profession:"سائق خاص", status:"reserved" } },
      { id:2, clientPhone:"0509876543", status:"contacted", at:"2026-06-04", worker:{ id:5, name:"Lakmali Perera", nationality:"سريلانكا", profession:"عاملة منزلية", status:"reserved" } },
    ],
    catalog: {
      officeName:"مكتب الرياض للاستقدام",
      nationalities:["الفلبين","إثيوبيا","كينيا"],
      workers:[
        { id:1, name:"Maria Santos", age:32, nationality:"الفلبين", profession:"عاملة منزلية", photoUrl:null, cvUrl:"/sample-cv.pdf" },
        { id:2, name:"Aisha Bekele", age:28, nationality:"إثيوبيا", profession:"عاملة منزلية", photoUrl:null, cvUrl:null },
        { id:4, name:"Grace Wanjiru", age:30, nationality:"كينيا", profession:"عاملة منزلية", photoUrl:null, cvUrl:"/sample-cv.pdf" },
      ],
    },
    track: {
      orderNo:"REC-1042", status:"external", statusLabel:"إجراءات خارجية",
      profession:"عاملة منزلية", nationality:"الفلبين", arrivalDate:null, warranty:null,
      timeline:[
        { status:"lead", label:"استفسار", at:"2026-05-02" },
        { status:"contract", label:"تعاقد", at:"2026-05-03" },
        { status:"visa", label:"تأشيرة", at:"2026-05-11" },
        { status:"selection", label:"اختيار العامل", at:"2026-05-18" },
        { status:"external", label:"إجراءات خارجية", at:"2026-05-22" },
      ],
      updates:[ { message:"مكتب الاستقدام | طلب رقم REC-1042: تم إصدار التأشيرة برقم 4023118765.", at:"2026-05-11" } ],
    },
  };

  const ok = (data, status=200) => ({ ok: status<400, status, json: async()=>data, text: async()=>JSON.stringify(data), blob: async()=>new Blob() });
  const readBody = (opts) => {
    if (!opts || !opts.body) return {};
    if (typeof opts.body === "string") { try { return JSON.parse(opts.body); } catch { return {}; } }
    if (opts.body instanceof FormData) { const o={}; for (const [k,v] of opts.body.entries()) o[k]=v; return o; }
    return {};
  };

  const realFetch = window.fetch.bind(window);
  window.fetch = async (url, opts={}) => {
    let path, qs;
    try { const u = new URL(url, location.origin); path = u.pathname; qs = u.searchParams; }
    catch { return realFetch(url, opts); }
    if (!path.startsWith("/api/")) return realFetch(url, opts); // ملفات ثابتة (assets) تمر طبيعياً
    const m = (opts.method || "GET").toUpperCase();
    const b = readBody(opts);
    const idIn = (re) => { const x = path.match(re); return x ? Number(x[1]) : null; };

    // المصادقة (دخول تجريبي)
    if (path === "/api/auth/login") {
      const isSuper = (b.username || "").toLowerCase() === "super";
      return ok({ token:"preview", user:{ role: isSuper?"super_admin":"supervisor", roleLabel: isSuper?"مدير المنصة":"مشرف المكتب", officeId:1, permissions: isSuper?SUPER:ALL } });
    }
    if (path === "/api/me") return ok({ role:"supervisor", roleLabel:"مشرف المكتب", officeId:1, permissions:ALL });

    // مدير المنصة
    if (path === "/api/admin/offices" && m === "GET") return ok(MOCK.offices);
    if (path === "/api/admin/offices" && m === "POST") {
      const o = { id: MOCK.offices.length+1, name: b.officeName, active:true, catalogKey:"demo-"+(MOCK.offices.length+1), users:1, orders:0, workers:0 };
      MOCK.offices.push(o);
      return ok({ officeId:o.id, officeName:o.name, supervisor:{ username:(b.supervisor&&b.supervisor.username)||"supervisor", role:"supervisor" } }, 201);
    }
    if (path.match(/^\/api\/admin\/offices\/\d+$/) && m === "PATCH") {
      const o = MOCK.offices.find((x)=>x.id===idIn(/\/(\d+)$/)); if(o) o.active = !!b.active; return ok({ id:o.id, name:o.name, active:o.active });
    }

    // مستخدمو المكتب
    if (path === "/api/users/roles") return ok(MOCK.roles);
    if (path === "/api/users" && m === "GET") return ok(MOCK.users);
    if (path === "/api/users" && m === "POST") { const u={ id:MOCK.users.length+1, name:b.name, username:b.username, role:b.role, active:true }; MOCK.users.push(u); return ok(u,201); }
    if (path.match(/^\/api\/users\/\d+$/) && m === "PATCH") { const u=MOCK.users.find((x)=>x.id===idIn(/\/(\d+)$/)); if(u){ if(b.active!==undefined)u.active=!!b.active; if(b.role)u.role=b.role; } return ok(u); }

    // العمالة
    if (path === "/api/workers/catalog-link") return ok({ key:"demo-riyadh", path:"/catalog.html?key=demo-riyadh" });
    if (path === "/api/workers/reservations" && m === "GET") return ok(MOCK.reservations);
    if (path.match(/^\/api\/workers\/reservations\/\d+$/) && m === "PATCH") {
      const r = MOCK.reservations.find((x)=>x.id===idIn(/\/(\d+)$/)); if(r) r.status = b.status; return ok({ ok:true });
    }
    if (path === "/api/workers" && m === "GET") return ok(MOCK.workers);
    if (path === "/api/workers" && m === "POST") {
      const w = { id:MOCK.workers.length+1, name:b.name||"عاملة", age:b.age?Number(b.age):null, nationality:b.nationality||"", profession:b.profession||"", phone:b.phone||"", passportNo:b.passportNo||"", status:b.status||"available", hasPhoto:!!b.photo, hasCv:!!b.cv, reservation:null };
      MOCK.workers.unshift(w); return ok(w,201);
    }
    if (path.match(/^\/api\/workers\/\d+$/) && m === "PATCH") { const w=MOCK.workers.find((x)=>x.id===idIn(/\/(\d+)$/)); if(w&&b.status)w.status=b.status; return ok(w||{}); }

    // البوابات العامة
    if (path === "/api/public/track") return ok(MOCK.track);
    if (path === "/api/public/catalog" && m === "GET") return ok(JSON.parse(JSON.stringify(MOCK.catalog)));
    if (path === "/api/public/catalog/reserve") return ok({ message: "تم استلام طلب الحجز (نسخة معاينة — لا يُحفظ فعلياً). في النظام الحقيقي يصل المكتب فوراً." }, 201);

    return ok({ error:"preview" }, 404);
  };

  // دخول تلقائي في صفحات الإدارة لعرض المحتوى مباشرةً
  window.addEventListener("load", () => {
    setTimeout(() => {
      try {
        const app = document.getElementById("app");
        if (typeof doLogin === "function" && app && getComputedStyle(app).display === "none") doLogin();
      } catch (e) {}
    }, 60);
  });
})();

</script>
<div class="wrap">
  <div class="brand"><div class="logo">RMS</div><div><div style="font-weight:700" id="officeName">العمالة المتوفرة</div><div class="muted">اختر من العمالة المتوفرة واحجز مباشرة</div></div></div>
  <h1>الجنسيات والعمالة المتوفرة</h1>
  <div class="muted" id="count"></div>
  <div class="filters" id="filters"></div>
  <div class="grid" id="grid"></div>
  <div id="msg"></div>
</div>

<!-- modal: عرض السيرة الذاتية + الحجز -->
<div class="overlay" id="overlay">
  <div class="modal">
    <div class="modal-head">
      <div class="av" id="mAv"></div>
      <div><div style="font-weight:700;font-size:17px" id="mName"></div><div class="muted" id="mMeta"></div></div>
      <button class="x" onclick="closeModal()">×</button>
    </div>
    <div class="modal-body">
      <div style="font-weight:700;margin-bottom:8px">السيرة الذاتية</div>
      <div id="mCv"></div>
      <div class="res" id="resBlock">
        <div style="font-weight:700">احجز هذه العاملة</div>
        <div class="muted">أدخل رقم جوالك ليتواصل معك المكتب لإتمام الحجز.</div>
        <input id="resPhone" inputmode="numeric" placeholder="05xxxxxxxx" />
        <div class="merr" id="resErr"></div>
        <button class="btn gold" id="resBtn" onclick="reserve()">تأكيد الحجز</button>
        <div class="ok" id="resOk"></div>
      </div>
    </div>
  </div>
</div>

<script>
const API = location.origin;
const params = new URLSearchParams(location.search);
const KEY = params.get("key");
const $ = (id) => document.getElementById(id);
let DATA = null, filterNat = "all", current = null;

async function load() {
  if (!KEY) { $("msg").innerHTML = '<div class="err">رابط غير صالح: المفتاح مفقود.</div>'; return; }
  try {
    const res = await fetch(`${API}/api/public/catalog?key=${encodeURIComponent(KEY)}`);
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || "تعذّر تحميل الكتالوج");
    DATA = data;
    $("officeName").textContent = data.officeName;
    renderFilters(); render();
  } catch (e) { $("msg").innerHTML = `<div class="err">${e.message}</div>`; }
}

function renderFilters() {
  const nats = ["all", ...DATA.nationalities];
  $("filters").innerHTML = nats.map((n) =>
    `<div class="chip ${n===filterNat?"active":""}" onclick="setFilter('${n}')">${n==="all"?"الكل":n}</div>`).join("");
}
function setFilter(n){ filterNat=n; renderFilters(); render(); }

function render() {
  const list = DATA.workers.filter((w) => filterNat==="all" || w.nationality===filterNat);
  $("count").textContent = `${list.length} عاملة متوفرة`;
  if (!list.length) { $("grid").innerHTML = '<div class="empty">لا توجد عمالة متوفرة حالياً ضمن هذا التصنيف.</div>'; return; }
  $("grid").innerHTML = list.map((w) => `
    <div class="wcard" onclick="openDetail(${w.id})">
      <div class="ph">${w.photoUrl ? `<img src="${API}${w.photoUrl}" onerror="this.parentNode.innerHTML='<div class=ini>${(w.name||'؟').slice(0,1)}</div>'"/>` : `<div class="ini">${(w.name||"؟").slice(0,1)}</div>`}</div>
      <div class="body">
        <div class="nm">${w.name || "عاملة"}</div>
        <div class="meta">${w.profession || ""}</div>
        <div class="tags"><span class="tag">${w.nationality || "—"}</span>${w.age ? `<span class="tag">${w.age} سنة</span>` : ""}</div>
        <div class="view-btn">عرض السيرة والحجز</div>
      </div>
    </div>`).join("");
}

function openDetail(id) {
  current = DATA.workers.find((w) => w.id === id);
  if (!current) return;
  $("mName").textContent = current.name || "عاملة";
  $("mMeta").textContent = `${current.profession || ""} · ${current.nationality || ""}${current.age ? " · " + current.age + " سنة" : ""}`;
  $("mAv").innerHTML = current.photoUrl ? `<img src="${API}${current.photoUrl}"/>` : (current.name || "؟").slice(0, 1);
  if (current.cvUrl) {
    const url = API + current.cvUrl;
    $("mCv").innerHTML = `<iframe class="cv-frame" src="${url}"></iframe><a class="open-cv" href="${url}" target="_blank">فتح السيرة في نافذة جديدة ↗</a>`;
  } else {
    $("mCv").innerHTML = '<div class="muted">لا توجد سيرة ذاتية مرفقة لهذه العاملة.</div>';
  }
  $("resPhone").value = ""; $("resErr").style.display = "none"; $("resOk").style.display = "none";
  $("resBtn").style.display = "block"; $("resPhone").style.display = "block";
  $("overlay").classList.add("open");
}
function closeModal(){ $("overlay").classList.remove("open"); }
$("overlay").addEventListener("click", (e) => { if (e.target.id === "overlay") closeModal(); });

async function reserve() {
  $("resErr").style.display = "none";
  const phone = $("resPhone").value.trim();
  try {
    const res = await fetch(`${API}/api/public/catalog/reserve`, {
      method: "POST", headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ key: KEY, workerId: current.id, phone }),
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || "تعذّر الحجز");
    $("resBtn").style.display = "none"; $("resPhone").style.display = "none";
    $("resOk").textContent = data.message; $("resOk").style.display = "block";
    // أزل العاملة من القائمة محلياً (أصبحت محجوزة)
    DATA.workers = DATA.workers.filter((w) => w.id !== current.id);
    setTimeout(() => { closeModal(); renderFilters(); render(); }, 2200);
  } catch (e) { $("resErr").textContent = e.message; $("resErr").style.display = "block"; }
}

load();
</script>
</body>
</html>
